name: Build and Deploy Hexo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hexo-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check deploy token
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "DEPLOY_TOKEN is missing. Add it in blog-source -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        run: |
          npm run clean
          npm run build

      - name: Publish to bloglmage
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/suxiao1228/bloglmage.git" deploy-repo
          rsync -av --delete --exclude ".git" public/ deploy-repo/

          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy from blog-source: ${GITHUB_SHA}"
          git push origin main
